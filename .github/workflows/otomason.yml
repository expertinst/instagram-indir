name: Instagram Otomasyon

on:
  schedule:
    - cron: '*/10 * * * *' # 10 dakikada bir çalışacak, tam istediğin gibi.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  indir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Calistir
        env:
          # BURASI DEĞİŞTİ: Artık senin 2TB'lık hesabının anahtarını kullanıyoruz.
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
        run: |
          pip install playwright requests google-api-python-client google-auth -q
          playwright install chromium
          playwright install-deps chromium
          python indir.py
      - name: Arsivi kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add arsiv.json
          git diff --staged --quiet || (git commit -m "arsiv guncellendi" && git push)
