name: Instagram Otomasyon
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  indir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Baslat
        env:
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
        run: |
          pip install playwright requests google-api-python-client google-auth -q
          playwright install chromium
          playwright install-deps chromium
          python indir.py
      - name: Arsivle
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add arsiv.json kaldigimiz_yer.txt
          git diff --staged --quiet || (git commit -m "update" && git push)
